<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Intimacy Survey — Partnerprogramma</title>
<style>
  :root{
    --navy:#1F3864; --navy-dark:#132644; --blue:#2E5395; --gold:#C9972B;
    --bg:#F5F6F8; --card:#FFFFFF; --border:#DFE3E8; --text:#1B1F27; --muted:#6B7280;
    --danger:#B3261E; --success:#1E7A46;
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  }
  html,body{ background:var(--bg); margin:0; padding:24px 16px; }
  #app{ max-width:760px; margin:0 auto; color:var(--text); }
  *{ box-sizing:border-box; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:32px; box-shadow:0 1px 3px rgba(16,24,40,0.06); }
  .brandbar{ background:linear-gradient(135deg,var(--navy) 0%, var(--blue) 100%); color:#fff; border-radius:12px 12px 0 0; padding:22px 32px; margin:-1px -1px 24px -1px; }
  .brandbar h1{ margin:0; font-size:19px; font-weight:700; letter-spacing:.2px;}
  .brandbar p{ margin:6px 0 0; font-size:13px; color:#DCE6F1; }
  .eyebrow{ text-transform:uppercase; font-size:11px; letter-spacing:1.2px; color:var(--gold); font-weight:700; margin-bottom:6px;}
  h2.section-title{ font-size:16px; margin:0 0 4px; color:var(--navy-dark); }
  .section-sub{ font-size:13px; color:var(--muted); margin:0 0 20px; }
  .progress-wrap{ margin-bottom:22px; }
  .progress-track{ height:6px; background:#E7EAEF; border-radius:99px; overflow:hidden; }
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--blue),var(--gold)); transition:width .35s ease; }
  .progress-label{ font-size:12px; color:var(--muted); margin-top:6px; display:flex; justify-content:space-between; }
  .question{ margin-bottom:26px; padding-bottom:22px; border-bottom:1px solid #EEF0F3; }
  .question:last-child{ border-bottom:none; }
  .q-text{ font-size:14.5px; font-weight:600; margin-bottom:12px; line-height:1.45; }
  .q-req{ color:var(--danger); margin-left:2px; }
  select, textarea, input[type=text]{ width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; background:#fff; color:var(--text); }
  textarea{ min-height:90px; resize:vertical; }
  select:focus, textarea:focus, input:focus{ outline:2px solid var(--blue); outline-offset:1px; }
  .likert-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .likert-opt{ flex:1; min-width:70px; }
  .likert-opt input{ display:none; }
  .likert-opt label{ display:block; text-align:center; padding:10px 4px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); transition:all .15s; }
  .likert-opt input:checked + label{ background:var(--navy); border-color:var(--navy); color:#fff; }
  .likert-ends{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:6px; }
  .nps-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .nps-opt{ flex:1; min-width:34px; }
  .nps-opt input{ display:none; }
  .nps-opt label{ display:block; text-align:center; padding:9px 0; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); }
  .nps-opt input:checked + label{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .rank-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0; }
  .rank-row span{ font-size:13.5px; }
  .rank-row select{ width:120px; }
  .btnbar{ display:flex; justify-content:space-between; margin-top:28px; gap:12px; }
  button{ font-family:inherit; font-size:14px; font-weight:700; padding:12px 22px; border-radius:8px; border:none; cursor:pointer; transition:opacity .15s, transform .1s; }
  button:active{ transform:scale(.98); }
  .btn-primary{ background:var(--navy); color:#fff; }
  .btn-primary:disabled{ background:#A9B4C4; cursor:not-allowed; }
  .btn-secondary{ background:#fff; color:var(--navy); border:1.5px solid var(--border); }
  .btn-link{ background:none; color:var(--muted); font-weight:600; font-size:12px; padding:6px; text-decoration:underline; }
  .pin-input{ letter-spacing:10px; font-size:26px; text-align:center; font-weight:700; padding:14px; }
  .error-box{ background:#FCEEEE; border:1px solid #F1C6C4; color:var(--danger); padding:12px 14px; border-radius:8px; font-size:13.5px; margin-bottom:16px; }
  .info-box{ background:#EFF5FF; border:1px solid #C7DAF2; color:var(--navy-dark); padding:12px 14px; border-radius:8px; font-size:13.5px; margin-bottom:16px; }
  .warn-box{ background:#FFF6E5; border:1px solid #F0D9A0; color:#7A5B00; padding:12px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
  .success-icon{ width:56px; height:56px; border-radius:50%; background:#E7F5EC; color:var(--success); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; }
  .center{ text-align:center; }
  .footer-link{ text-align:center; margin-top:18px; }
  table{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:14px; }
  th, td{ border:1px solid var(--border); padding:6px 8px; text-align:left; vertical-align:top; }
  th{ background:var(--bg); }
  .stat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin:16px 0; }
  .stat{ background:var(--bg); border-radius:10px; padding:14px; text-align:center; }
  .stat b{ display:block; font-size:22px; color:var(--navy); }
  .stat span{ font-size:11.5px; color:var(--muted); }
  .scroll-table{ max-height:420px; overflow:auto; border:1px solid var(--border); border-radius:8px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   CONFIGURATIE — VUL DIT IN VOORDAT JE DE PAGINA HOST
   ===================================================================== */
const CONFIG = {

    {id:"q14", type:"likert", text:"De technische en pre-sales ondersteuning stelt u in staat om uw eindklanten goed te bedienen."},
    {id:"q15", type:"likert", text:"Communicatie over nieuwe producten, promoties of prijswijzigingen is tijdig en duidelijk."},

    {id:"q29", type:"nps", text:"Hoe waarschijnlijk is het dat uw verkopers dit merk boven concurrerende merken aanbevelen aan eindklanten? (0 = zeer onwaarschijnlijk, 10 = zeer waarschijnlijk)"},

      factors:["Prijs / marge","Productkwaliteit","Merkbekendheid bij eindklant","Ondersteuning vendor","Beschikbaarheid / voorraad"]},

  ]},

const ALL_ITEMS = QUESTIONS.flatMap(s => s.items.map(i => ({...i, sec:s.sec})));

let state = { screen:"gate", pin:"", step:0, answers:{}, error:"", loading:false, adminData:null,
              participantName:"", participantEmail:"", rosterImportMsg:"" };

try{
  const params = new URLSearchParams(window.location.search);
  const p = params.get("pin");
  if(p && /^\d{6}$/.test(p)) state.pin = p;
}catch(e){}

function apiConfigured(){
  return CONFIG.API_URL && CONFIG.API_URL.indexOf("PLAK_HIER") === -1;
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  const el = document.createElement("div");

  if(!apiConfigured()){
    el.appendChild(SetupWarning());
  } else if(state.screen==="gate") el.appendChild(GateScreen());
  else if(state.screen==="blocked") el.appendChild(BlockedScreen());
  else if(state.screen==="survey") el.appendChild(SurveyScreen());
  else if(state.screen==="thanks") el.appendChild(ThanksScreen());
  else if(state.screen==="admin") el.appendChild(AdminScreen());

  app.appendChild(el);
}

function SetupWarning(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2 class="section-title">Configuratie ontbreekt</h2>
    <div class="error-box">
      Deze pagina is nog niet gekoppeld aan een database. Open het bestand, zoek naar
      <code>CONFIG.API_URL</code> bovenaan het script en vul daar de Web-app URL van je
      Google Apps Script-implementatie in.
    </div>
    <p class="section-sub">Zie de meegeleverde instructies (Code.gs) voor de opzet van de Google Sheet en het script.</p>
  `;
  wrap.appendChild(card);
  return wrap;
}

function brandbar(sub){
  const d = document.createElement("div");
  d.className = "brandbar";
  d.innerHTML = `<h1>Client Intimacy Survey — Partnerprogramma</h1><p>${sub||"Uw ervaring als reseller/partner"}</p>`;
  return d;
}

/* ---------------------------------------------------------------------
   API helpers
--------------------------------------------------------------------- */
async function apiCheckPin(pin){
  const url = CONFIG.API_URL + "?action=checkPin&pin=" + encodeURIComponent(pin);
  const res = await fetch(url, { method:"GET" });
  return await res.json();
}
async function apiSubmit(payload){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({action:"submit"}, payload)),
  });
  return await res.json();
}
async function apiAdminList(password){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({action:"adminList", password}),
  });
  return await res.json();
}
async function apiAdminImportRoster(password, rows){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({action:"adminImportRoster", password, rows}),
  });
  return await res.json();
}

/* ---------------------------------------------------------------------
   Gate screen
--------------------------------------------------------------------- */
function GateScreen(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  card.appendChild(brandbar("Vul uw unieke 6-cijferige pincode in om te starten"));

  card.innerHTML += `
    <div class="eyebrow">Toegang</div>
    <h2 class="section-title">Voer uw pincode in</h2>
    <p class="section-sub">De pincode is eenmalig te gebruiken. Heeft u deze al ingevuld, dan kunt u de survey niet nogmaals openen.</p>
    ${state.error ? `<div class="error-box">${state.error}</div>` : ""}
    <input id="pinInput" class="pin-input" type="text" inputmode="numeric" maxlength="6" placeholder="000000" value="${state.pin}" />
    <div class="btnbar">
      <span></span>
      <button id="gateBtn" class="btn-primary" ${state.loading ? "disabled" : ""}>${state.loading ? "Bezig..." : "Doorgaan"}</button>
    </div>
    <div class="footer-link"><button class="btn-link" id="adminLink">Beheerder? Bekijk resultaten</button></div>
  `;
  wrap.appendChild(card);

  setTimeout(()=>{
    const input = document.getElementById("pinInput");
    input.focus();
    input.addEventListener("input", (e)=>{
      e.target.value = e.target.value.replace(/[^0-9]/g,"").slice(0,6);
      state.pin = e.target.value;
    });
    input.addEventListener("keydown",(e)=>{ if(e.key==="Enter") handleGateSubmit(); });
    document.getElementById("gateBtn").addEventListener("click", handleGateSubmit);
    document.getElementById("adminLink").addEventListener("click", handleAdminLogin);
  },0);

  return wrap;
}

async function handleGateSubmit(){
  if(!/^\d{6}$/.test(state.pin)){
    state.error = "Voer een geldige 6-cijferige pincode in.";
    render();
    return;
  }
  state.loading = true; state.error = "";
  render();
  try{
    const data = await apiCheckPin(state.pin);
    if(data.error){
      state.loading = false;
      state.error = "Er ging iets mis: " + data.error;
      render();
      return;
    }
    if(data.used){
      state.loading = false;
      state.screen = "blocked";
      render();
      return;
    }
    state.participantName = data.naam || "";
    state.participantEmail = data.email || "";
    state.loading = false;
    state.screen = "survey";
    state.step = 0;
    render();
  }catch(err){
    state.loading = false;
    state.error = "Kon geen verbinding maken met de database. Controleer uw internetverbinding en probeer opnieuw.";
    render();
  }
}

function BlockedScreen(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  card.appendChild(brandbar());
  card.innerHTML += `
    <div class="error-box">Deze pincode is al gebruikt. Elke pincode kan slechts één keer worden ingevuld. Neem contact op met uw vendor-contactpersoon als u denkt dat dit niet klopt.</div>
    <button class="btn-secondary" id="backBtn">Terug</button>
  `;
  wrap.appendChild(card);
  setTimeout(()=>{
    document.getElementById("backBtn").addEventListener("click", ()=>{ state.screen="gate"; state.pin=""; state.error=""; render(); });
  },0);
  return wrap;
}

/* ---------------------------------------------------------------------
   Survey screen
--------------------------------------------------------------------- */
function SurveyScreen(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  const section = QUESTIONS[state.step];
  const totalSteps = QUESTIONS.length;
  card.appendChild(brandbar());

  const progressPct = Math.round((state.step/totalSteps)*100);
  const progWrap = document.createElement("div");
  progWrap.className = "progress-wrap";
  progWrap.innerHTML = `
    <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="progress-label"><span>Stap ${state.step+1} van ${totalSteps}</span><span>${section.sec}</span></div>
  `;
  card.appendChild(progWrap);

  if(state.participantName){
    const welcome = document.createElement("div");
    welcome.className = "info-box";
    welcome.textContent = `Welkom, ${state.participantName}! Fijn dat u de tijd neemt om dit in te vullen.`;
    card.appendChild(welcome);
  }

  if(state.error){
    const eb = document.createElement("div");
    eb.className = "error-box";
    eb.textContent = state.error;
    card.appendChild(eb);
  }

  section.items.forEach(q=>{ card.appendChild(renderQuestion(q)); });

  const btnbar = document.createElement("div");
  btnbar.className = "btnbar";
  btnbar.innerHTML = `
    <button class="btn-secondary" id="prevBtn" ${state.step===0 ? "disabled style='visibility:hidden'" : ""}>Vorige</button>
    <button class="btn-primary" id="nextBtn" ${state.loading ? "disabled" : ""}>${state.loading ? "Bezig..." : (state.step===totalSteps-1 ? "Versturen" : "Volgende")}</button>
  `;
  card.appendChild(btnbar);
  wrap.appendChild(card);

  setTimeout(()=>{
    if(state.step>0) document.getElementById("prevBtn").addEventListener("click", ()=>{ state.step--; state.error=""; render(); });
    document.getElementById("nextBtn").addEventListener("click", handleNext);
    section.items.forEach(q=>{
      if(q.type==="mc"){
        document.getElementById(q.id).addEventListener("change",(e)=>{ state.answers[q.id]=e.target.value; });
      } else if(q.type==="likert" || q.type==="nps"){
        document.querySelectorAll(`input[name="${q.id}"]`).forEach(r=>{
          r.addEventListener("change",(e)=>{ state.answers[q.id]=e.target.value; });
        });
      } else if(q.type==="rank"){
        q.factors.forEach((f,idx)=>{
          document.getElementById(q.id+"_"+idx).addEventListener("change",(e)=>{
            if(!state.answers[q.id]) state.answers[q.id]={};
            state.answers[q.id][f]=e.target.value;
          });
        });
      } else if(q.type==="open"){
        document.getElementById(q.id).addEventListener("input",(e)=>{ state.answers[q.id]=e.target.value; });
      }
    });
  },0);

  return wrap;
}

function renderQuestion(q){
  const div = document.createElement("div");
  div.className = "question";
  const label = `<div class="q-text">${q.text}<span class="q-req">*</span></div>`;

  if(q.type==="mc"){
    const val = state.answers[q.id] || "";
    div.innerHTML = label + `
      <select id="${q.id}">
        <option value="" ${val===""?"selected":""}>Kies een optie...</option>
        ${q.options.map(o=>`<option value="${o}" ${val===o?"selected":""}>${o}</option>`).join("")}
      </select>`;
  } else if(q.type==="likert"){
    const val = state.answers[q.id] || "";
    let opts = "";
    for(let i=1;i<=5;i++){
      opts += `<div class="likert-opt">
        <input type="radio" name="${q.id}" id="${q.id}_${i}" value="${i}" ${val==String(i)?"checked":""}/>
        <label for="${q.id}_${i}">${i}</label>
      </div>`;
    }
    div.innerHTML = label + `<div class="likert-row">${opts}</div>
      <div class="likert-ends"><span>Helemaal mee oneens</span><span>Helemaal mee eens</span></div>`;
  } else if(q.type==="nps"){
    const val = state.answers[q.id] || "";
    let opts = "";
    for(let i=0;i<=10;i++){
      opts += `<div class="nps-opt">
        <input type="radio" name="${q.id}" id="${q.id}_${i}" value="${i}" ${val==String(i)?"checked":""}/>
        <label for="${q.id}_${i}">${i}</label>
      </div>`;
    }
    div.innerHTML = label + `<div class="nps-row">${opts}</div>
      <div class="likert-ends"><span>Zeer onwaarschijnlijk</span><span>Zeer waarschijnlijk</span></div>`;
  } else if(q.type==="rank"){
    const val = state.answers[q.id] || {};
    let rows = q.factors.map((f,idx)=>`
      <div class="rank-row"><span>${f}</span>
        <select id="${q.id}_${idx}">
          <option value="">Rang...</option>
          ${[1,2,3,4,5].map(n=>`<option value="${n}" ${val[f]==String(n)?"selected":""}>${n}</option>`).join("")}
        </select>
      </div>`).join("");
    div.innerHTML = label + rows;
  } else if(q.type==="open"){
    const val = state.answers[q.id] || "";
    div.innerHTML = label + `<textarea id="${q.id}" placeholder="Uw antwoord...">${val}</textarea>`;
  }
  return div;
}

function validateStep(){
  const section = QUESTIONS[state.step];
  for(const q of section.items){
    if(q.type==="rank"){
      const val = state.answers[q.id] || {};
      const chosen = q.factors.map(f=>val[f]).filter(Boolean);
      if(chosen.length < q.factors.length) return "Rangschik alstublieft alle factoren voordat u verdergaat.";
      const uniq = new Set(chosen);
      if(uniq.size !== q.factors.length) return "Gebruik elk rangnummer (1-5) precies één keer.";
    } else {
      if(q.type === "open") continue;
      const val = state.answers[q.id];
      if(val === undefined || val === "" || val === null) return "Beantwoord alstublieft alle verplichte vragen voordat u verdergaat.";
    }
  }
  return null;
}

async function handleNext(){
  const err = validateStep();
  if(err){ state.error = err; render(); return; }
  state.error = "";
  if(state.step < QUESTIONS.length - 1){
    state.step++;
    render();
    window.scrollTo({top:0, behavior:"smooth"});
  } else {
    await submitSurvey();
  }
}

async function submitSurvey(){
  state.loading = true;
  render();
  try{
    const data = await apiSubmit({
      pin: state.pin,
      naam: state.participantName || "",
      email: state.participantEmail || "",
      answers: state.answers,
    });
    state.loading = false;
    if(data.error){
      state.error = "Versturen mislukt: " + data.error;
      render();
      return;
    }
    if(data.success === false && data.reason === "already_used"){
      state.screen = "blocked";
      render();
      return;
    }
    state.screen = "thanks";
    render();
  }catch(err){
    state.loading = false;
    state.error = "Versturen mislukt. Controleer uw verbinding en probeer opnieuw.";
    render();
  }
}

function ThanksScreen(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card center";
  card.appendChild(brandbar());
  const greet = state.participantName ? `Bedankt, ${state.participantName}!` : "Bedankt voor uw antwoorden!";
  card.innerHTML += `
    <div class="success-icon">✓</div>
    <h2 class="section-title">${greet}</h2>
    <p class="section-sub">Uw antwoorden zijn geregistreerd. Deze pincode kan niet nogmaals worden gebruikt.</p>
  `;
  wrap.appendChild(card);
  return wrap;
}

/* ---------------------------------------------------------------------
   Admin panel
--------------------------------------------------------------------- */
let adminPasswordCache = "";

async function handleAdminLogin(){
  const pw = prompt("Voer het beheerderswachtwoord in:");
  if(pw === null) return;
  adminPasswordCache = pw;
  state.screen = "admin";
  state.adminData = null;
  render();
  await loadAdminData();
}

async function loadAdminData(){
  try{
    const data = await apiAdminList(adminPasswordCache);
    if(data.error){
      alert(data.error);
      state.screen = "gate";
      render();
      return;
    }
    state.adminData = data.rows || [];
  }catch(e){
    state.adminData = [];
  }
  render();
}

function toCSV(rows){
  if(!rows.length) return "";
  const headers = Object.keys(rows[0]);
  const csvRows = [headers.join(",")];
  rows.forEach(r=>{
    const row = headers.map(h=>{
      let v = r[h];
      if(v === undefined || v === null) v = "";
      v = String(v).replace(/"/g,'""');
      return `"${v}"`;
    });
    csvRows.push(row.join(","));
  });
  return csvRows.join("\n");
}

async function importRoster(){
  const textarea = document.getElementById("rosterInput");
  const raw = textarea.value.trim();
  if(!raw){ state.rosterImportMsg = "Plak eerst gegevens (naam,e-mail,pincode per regel)."; render(); return; }
  const lines = raw.split("\n").map(l=>l.trim()).filter(Boolean);
  const rows = [];
  let skipped = 0;
  lines.forEach(line=>{
    const parts = line.split(/[,;\t]/).map(p=>p.trim());
    if(parts.length < 3 || !/^\d{6}$/.test(parts[2])){ skipped++; return; }
    rows.push({ naam: parts[0], email: parts[1], pincode: parts[2] });
  });
  if(!rows.length){ state.rosterImportMsg = "Geen geldige regels gevonden."; render(); return; }
  try{
    const data = await apiAdminImportRoster(adminPasswordCache, rows);
    if(data.error){ state.rosterImportMsg = data.error; render(); return; }
    state.rosterImportMsg = `${data.added} nieuw, ${data.updated} bijgewerkt${skipped ? `, ${skipped} regel(s) overgeslagen` : ""}.`;
  }catch(e){
    state.rosterImportMsg = "Importeren mislukt.";
  }
  render();
}

function AdminScreen(){
  const wrap = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  card.appendChild(brandbar("Analysedashboard — alleen voor beheerders"));

  if(state.adminData === null){
    card.innerHTML += `<p class="section-sub">Gegevens laden...</p>`;
    wrap.appendChild(card);
    return wrap;
  }

  const rows = state.adminData;

  card.innerHTML += `
    <div class="stat-grid">
      <div class="stat"><b>${rows.length}</b><span>Volledig ingevulde reacties</span></div>
      <div class="stat"><b>Live</b><span>Bron: Google Sheet-database</span></div>
    </div>
    <div class="warn-box">Deze data staat ook rechtstreeks in je Google Sheet (tabblad "Antwoorden") — je kunt die daar altijd direct openen, filteren en downloaden als Excel-bestand.</div>

    <h2 class="section-title" style="margin-top:8px;">Deelnemers importeren (naam &amp; e-mail koppelen aan pincode)</h2>
    <p class="section-sub">Plak per regel: <em>naam,e-mailadres,pincode</em>. Dit schrijft direct naar het tabblad "Deelnemers" in je Google Sheet. Je kunt rijen ook rechtstreeks in de Sheet zelf toevoegen — dat werkt net zo goed.</p>
    ${state.rosterImportMsg ? `<div class="info-box">${state.rosterImportMsg}</div>` : ""}
    <textarea id="rosterInput" placeholder="Jan Jansen,jan@partnerbedrijf.nl,483920
Marie de Vries,marie@partnerbedrijf.nl,120944" style="min-height:110px; font-family:monospace; font-size:12.5px;"></textarea>
    <div class="btnbar" style="justify-content:flex-start;">
      <button class="btn-primary" id="importRosterBtn">Importeren</button>
    </div>

    <h2 class="section-title" style="margin-top:8px;">Resultaten</h2>
    <div class="btnbar" style="justify-content:flex-start; gap:10px;">
      <button class="btn-secondary" id="refreshBtn">Vernieuwen</button>
      <button class="btn-primary" id="exportBtn">Exporteer als CSV</button>
      <span style="flex:1"></span>
      <button class="btn-link" id="closeAdmin">Sluiten</button>
    </div>
    <div class="scroll-table">
      <table>
        <thead><tr><th>Pincode</th><th>Naam</th><th>Ingevuld op</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td>${r.Pincode || "-"}</td>
            <td>${r.Naam || "-"}</td>
            <td>${r.Timestamp ? new Date(r.Timestamp).toLocaleString("nl-NL") : "-"}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  `;
  wrap.appendChild(card);

  setTimeout(()=>{
    document.getElementById("refreshBtn").addEventListener("click", loadAdminData);
    document.getElementById("closeAdmin").addEventListener("click", ()=>{ state.screen="gate"; render(); });
    document.getElementById("importRosterBtn").addEventListener("click", importRoster);
    document.getElementById("exportBtn").addEventListener("click", ()=>{
      const csv = toCSV(rows);
      const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "client_intimacy_survey_resultaten.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  },0);

  return wrap;
}

render();
</script>
